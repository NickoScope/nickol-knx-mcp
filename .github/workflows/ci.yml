name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: End-to-end smoke test (synthetic 16-GA project)
        run: python tests/test_pipeline.py

      - name: Device catalog wiring (catalog-exact + recipe fallback)
        run: python tests/test_device_catalog.py

      - name: App-program parser (synthetic .knxprod round-trip)
        run: python tests/test_appprog_parser.py

      - name: v0.8 fixes (positional pairing, ref-merge, range names)
        run: python tests/test_v08_fixes.py

      - name: Console script is installed
        run: |
          python -c "import importlib.metadata as m; print('entry points:', [e.name for e in m.entry_points(group='console_scripts') if e.name == 'nickol-knx-mcp'])"
          command -v nickol-knx-mcp
